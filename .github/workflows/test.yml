name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # package.json engines.node is >=22; 20 kept for lower-bound breadth.
        # 18 dropped — EOL (2025-04) + below the floor; it only stayed green
        # until a security-patched sharp (>=0.35, the libvips-CVE fix) required
        # a newer Node than 18 to load the transformers embedder.
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - name: Root unit tests
        # npm test (not bare node --test): the pretest hook builds the
        # event-schemas workspace dist that the broadcast libs fail loud on.
        # No 2GB embedding model on CI runners — the embedding suites skip
        # VISIBLY via the per-file census (see test/helpers/embedder-available.mjs).
        env:
          OPENCLAW_NO_EMBED_MODEL: "1"
        run: npm test
      - name: Root dependency audit — high severity gate
        run: npm audit --audit-level=high
      - name: Packed-tarball smoke — the two past packaging escapes stay caught
        if: matrix.node-version == 22
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.txt
          grep -q " install.sh" /tmp/pack.txt
          test "$(grep -c " scripts/install/.*\.sh" /tmp/pack.txt)" = "9"
          grep -q " packages/event-schemas/dist/" /tmp/pack.txt

  mission-control-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd mission-control && npm ci
      - name: Mission Control lint — zero errors gate (warnings are the burn-down list)
        run: cd mission-control && npx eslint .
      - name: Mission Control unit tests
        run: cd mission-control && npx vitest run src/lib/__tests__/
      - name: Mission Control dependency audit — high severity gate
        run: cd mission-control && npm audit --audit-level=high
      - name: Mission Control production build gate
        run: cd mission-control && npm run build
