name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - name: Root unit tests
        # npm test (not bare node --test): the pretest hook builds the
        # event-schemas workspace dist that the broadcast libs fail loud on.
        # No 2GB embedding model on CI runners — the embedding suites skip
        # VISIBLY via the per-file census (see test/helpers/embedder-available.mjs).
        env:
          OPENCLAW_NO_EMBED_MODEL: "1"
        run: npm test

  mission-control-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd mission-control && npm ci
      - name: Mission Control unit tests
        run: cd mission-control && npx vitest run src/lib/__tests__/
