# OpenClaw NATS — multi-machine cluster node (ONE per machine; R=3 across machines).
# Template — rendered by `install.sh --cluster-peers=<peer-ip>,<peer-ip>` to
#   ~/.openclaw/config/nats.conf  (replaces the single-node default on this machine).
#
# Unlike the localhost dev cluster (nats-{1,2,3}.conf, 3 procs on one box = NO real
# failsafe), this binds 0.0.0.0 so PEER MACHINES can reach client/cluster/monitor,
# and its routes point at the OTHER machines. Same ports on every machine because
# each is a separate host. Clients still authenticate with the token; the CLUSTER
# routes rely on the private network (Tailscale/VPN) for isolation — NATS cluster
# auth uses user/password not tokens, and a tailnet already gates who can connect.
# Keep these machines on a private tailnet; do not expose 6222 to the open internet.

server_name: ${OPENCLAW_NATS_SERVER_NAME}

listen: 0.0.0.0:4222

http: 0.0.0.0:8222

authorization {
  token: "${OPENCLAW_NATS_TOKEN}"
}

jetstream {
  store_dir: ${HOME}/.openclaw/nats/jetstream
  max_mem: 256MB
  max_file: 2GB
}

cluster {
  name: openclaw-cluster
  listen: 0.0.0.0:6222
  routes = [
${OPENCLAW_NATS_CLUSTER_ROUTES}
  ]
}
