# OpenClaw NATS — multi-machine cluster node (ONE per machine; R=3 across machines).
# Template — rendered by `install.sh --cluster-peers=<ip>,<ip> --cluster-bind=<own-ip>`
# to ~/.openclaw/config/nats.conf (replaces the single-node default on this machine).
#
# D2/D4 conformance (item 9, closes the D12 §3 violation):
#   - listen/cluster bind the machine's OWN tailnet address — NEVER 0.0.0.0.
#   - the monitor stays loopback-only (peers never need it).
#   - the cluster port is authenticated (user/password — NATS cluster blocks do
#     not support token auth; that parser rejection is how auth got dropped the
#     first time). Routes carry the same credentials.
# Every machine in the council shares OPENCLAW_NATS_TOKEN (clients) and
# OPENCLAW_NATS_CLUSTER_PASS (routes) — install persists both in openclaw.env.

server_name: ${OPENCLAW_NATS_SERVER_NAME}

listen: ${OPENCLAW_NATS_BIND_ADDR}:4222

http: 127.0.0.1:8222

authorization {
  token: "${OPENCLAW_NATS_TOKEN}"
}

jetstream {
  store_dir: ${HOME}/.openclaw/nats/jetstream
  max_mem: 256MB
  max_file: 2GB
}

cluster {
  name: openclaw-cluster
  listen: ${OPENCLAW_NATS_BIND_ADDR}:6222
  authorization {
    user: "openclaw-route"
    password: "${OPENCLAW_NATS_CLUSTER_PASS}"
  }
  routes = [
${OPENCLAW_NATS_CLUSTER_ROUTES}
  ]
}
