# OpenClaw NATS — single-node bus (the DEFAULT install target)
# Client: 4222  Monitor: 8222. Loopback + token auth + JetStream.
# Template — rendered by install.sh to ~/.openclaw/config/nats.conf
# The R=3 cluster (nats-{1,2,3}.conf) is the operator-gated upgrade path
# (federation step 1.5); this file is what a fresh node runs on.

server_name: openclaw-nats-${OPENCLAW_NODE_ID}

listen: 127.0.0.1:4222

http: 127.0.0.1:8222

authorization {
  token: "${OPENCLAW_NATS_TOKEN}"
}

jetstream {
  # Absolute path — nats-server does not tilde-expand store_dir.
  store_dir: ${HOME}/.openclaw/nats/jetstream
  max_mem: 256MB
  max_file: 2GB
}
