# OpenClaw NATS Node 1 — dev cluster (3-node, R=3)
# Client: 4222  Cluster: 6222  Monitor: 8222

server_name: openclaw-nats-1

listen: 0.0.0.0:4222

http_port: 8222

jetstream {
  store_dir: ~/.openclaw/nats/jetstream-1
  max_mem: 256MB
  max_file: 1GB
}

cluster {
  name: openclaw-cluster
  listen: 0.0.0.0:6222
  routes = [
    nats-route://127.0.0.1:6223
    nats-route://127.0.0.1:6224
  ]
}
