# OpenClaw NATS Node 1 — dev cluster (3-node, R=3)
# Client: 4222  Cluster: 6222  Monitor: 8222
# Template — rendered by install.sh to ~/.openclaw/config/nats-1.conf

server_name: openclaw-nats-1

listen: 127.0.0.1:4222

http: 127.0.0.1:8222

authorization {
  token: "${OPENCLAW_NATS_TOKEN}"
}

jetstream {
  store_dir: ${HOME}/.openclaw/nats/jetstream-1
  max_mem: 256MB
  max_file: 1GB
}

cluster {
  name: openclaw-cluster
  listen: 127.0.0.1:6222
  routes = [
    nats-route://127.0.0.1:6223
    nats-route://127.0.0.1:6224
  ]
}
