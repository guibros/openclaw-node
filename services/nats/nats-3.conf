# OpenClaw NATS Node 3 — dev cluster (3-node, R=3)
# Client: 4224  Cluster: 6224  Monitor: 8224
# Template — rendered by install.sh to ~/.openclaw/config/nats-3.conf

server_name: openclaw-nats-3

listen: 127.0.0.1:4224

http: 127.0.0.1:8224

authorization {
  token: "${OPENCLAW_NATS_TOKEN}"
}

jetstream {
  store_dir: ${HOME}/.openclaw/nats/jetstream-3
  max_mem: 256MB
  max_file: 1GB
}

cluster {
  name: openclaw-cluster
  listen: 127.0.0.1:6224
  routes = [
    nats-route://127.0.0.1:6222
    nats-route://127.0.0.1:6223
  ]
}
