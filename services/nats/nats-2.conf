# OpenClaw NATS Node 2 — dev cluster (3-node, R=3)
# Client: 4223  Cluster: 6223  Monitor: 8223
# Template — rendered by install.sh to ~/.openclaw/config/nats-2.conf

server_name: openclaw-nats-2

listen: 127.0.0.1:4223

http: 127.0.0.1:8223

authorization {
  token: "${OPENCLAW_NATS_TOKEN}"
}

jetstream {
  store_dir: ~/.openclaw/nats/jetstream-2
  max_mem: 256MB
  max_file: 1GB
}

cluster {
  name: openclaw-cluster
  listen: 127.0.0.1:6223
  routes = [
    nats-route://127.0.0.1:6222
    nats-route://127.0.0.1:6224
  ]
}
